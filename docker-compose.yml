services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oscars
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/oscars
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn oscars.api.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
